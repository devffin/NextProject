# NextProjectOS - Configuration picom pour effets Aero
# Effets de transparence, flou et ombres style Windows 7 Aero Glass

backend = "xrender";
vsync = true;

# Transparence des fenêtres
active-opacity = 1.0;
inactive-opacity = 0.90;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Flou Aero (effet de verre)
blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;
blur-kernels = "3x3box";
blur: {
    method = "dual_kawase";
    strength = 7;
    background = true;
    background-frame = true;
    background-fixed = false;
};

# Ombres portées
shadow = true;
shadow-radius = 12;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-opacity = 0.4;
shadow-red = 0.0;
shadow-green = 0.0;
shadow-blue = 0.0;
shadow-exclude = [
    "name = 'npos-panel'",
    "name = 'npos-dock'",
    "name = 'npos-menu'",
    "name = 'npos-desktop'",
];

# Transparence du panneau
opacity-rule = [
    "85:name = 'npos-panel'",
    "80:name = 'npos-dock'",
];

# Animations
fading = true;
fade-delta = 8;
fade-in-step = 0.05;
fade-out-step = 0.05;

# Détection des fenêtres
detect-rounded-pixmaps = true;
detect-transient = true;
detect-client-opacity = true;
detect-window-opacity = true;
use-ewmh-active-win = true;
unredir-if-possible = false;

# Fenêtres exclues des effets
focus-exclude = [
    "name = 'npos-panel'",
    "name = 'npos-dock'",
    "name = 'npos-menu'",
    "name = 'npos-desktop'",
];

# Transparence pour les menus contextuels
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.9; focus = false; };
    dock = { shadow = false; opacity = 0.85; blur-background = true; };
    dropdown_menu = { opacity = 0.95; };
    popup_menu = { opacity = 0.95; };
    utility = { fade = true; shadow = true; };
};
