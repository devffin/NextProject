<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="40%" stop-color="#0099ff"/>
      <stop offset="70%" stop-color="#66ccff"/>
      <stop offset="100%" stop-color="#b3e0ff"/>
    </linearGradient>

    <linearGradient id="skyFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b3e0ff"/>
      <stop offset="100%" stop-color="#80c0e0"/>
    </linearGradient>

    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffffee" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#ffeeaa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffeeaa" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="logoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ciel -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Soleil avec halo -->
  <circle cx="1400" cy="180" r="120" fill="url(#sun)"/>
  <circle cx="1400" cy="180" r="50" fill="#ffffff" opacity="0.8"/>

  <!-- Nuages -->
  <g opacity="0.6" fill="white">
    <!-- Nuage 1 -->
    <ellipse cx="300" cy="180" rx="120" ry="35"/>
    <ellipse cx="240" cy="170" rx="70" ry="28"/>
    <ellipse cx="360" cy="170" rx="80" ry="30"/>
    <ellipse cx="300" cy="160" rx="60" ry="22"/>

    <!-- Nuage 2 -->
    <ellipse cx="1100" cy="140" rx="100" ry="30"/>
    <ellipse cx="1050" cy="130" rx="60" ry="24"/>
    <ellipse cx="1150" cy="130" rx="65" ry="25"/>
    <ellipse cx="1100" cy="120" rx="50" ry="18"/>

    <!-- Nuage 3 -->
    <ellipse cx="1700" cy="220" rx="90" ry="25"/>
    <ellipse cx="1650" cy="210" rx="55" ry="20"/>
    <ellipse cx="1750" cy="210" rx="60" ry="22"/>
  </g>

  <!-- Herbe verte -->
  <rect x="0" y="720" width="1920" height="360" fill="#4caf50"/>

  <!-- Collines -->
  <path d="M0 720 Q200 640 400 680 Q600 620 800 660 Q1000 600 1200 650 Q1400 610 1600 640 Q1800 620 1920 660 L1920 720 L0 720 Z" fill="#66bb6a"/>
  <path d="M0 750 Q300 690 600 730 Q900 680 1200 720 Q1500 690 1920 730 L1920 780 L0 780 Z" fill="#43a047"/>

  <!-- Arbres -->
  <g fill="#2e7d32">
    <!-- Arbre 1 -->
    <rect x="150" y="650" width="12" height="80" fill="#5d4037"/>
    <ellipse cx="156" cy="630" rx="40" ry="50"/>
    <ellipse cx="156" cy="610" rx="30" ry="35"/>
    <ellipse cx="156" cy="595" rx="20" ry="22"/>

    <!-- Arbre 2 -->
    <rect x="450" y="660" width="10" height="70" fill="#5d4037"/>
    <ellipse cx="455" cy="640" rx="35" ry="45"/>
    <ellipse cx="455" cy="620" rx="28" ry="32"/>
    <ellipse cx="455" cy="605" rx="18" ry="20"/>

    <!-- Arbre 3 -->
    <rect x="750" y="640" width="14" height="85" fill="#5d4037"/>
    <ellipse cx="757" cy="615" rx="45" ry="55"/>
    <ellipse cx="757" cy="595" rx="32" ry="38"/>
    <ellipse cx="757" cy="580" rx="22" ry="24"/>

    <!-- Arbre 4 -->
    <rect x="1200" y="650" width="11" height="75" fill="#5d4037"/>
    <ellipse cx="1206" cy="630" rx="38" ry="48"/>
    <ellipse cx="1206" cy="610" rx="28" ry="34"/>
    <ellipse cx="1206" cy="595" rx="18" ry="20"/>

    <!-- Arbre 5 -->
    <rect x="1650" y="645" width="13" height="80" fill="#5d4037"/>
    <ellipse cx="1657" cy="625" rx="42" ry="50"/>
    <ellipse cx="1657" cy="605" rx="30" ry="36"/>
    <ellipse cx="1657" cy="590" rx="20" ry="22"/>
  </g>

  <!-- Buissons -->
  <ellipse cx="200" cy="720" rx="30" ry="20" fill="#388e3c"/>
  <ellipse cx="600" cy="730" rx="25" ry="18" fill="#388e3c"/>
  <ellipse cx="1000" cy="725" rx="28" ry="19" fill="#388e3c"/>
  <ellipse cx="1500" cy="730" rx="22" ry="16" fill="#388e3c"/>
  <ellipse cx="1800" cy="720" rx="26" ry="18" fill="#388e3c"/>

  <!-- Fleurs colorées -->
  <circle cx="300" cy="718" r="4" fill="#ff4081"/>
  <circle cx="500" cy="725" r="3" fill="#ffeb3b"/>
  <circle cx="850" cy="720" r="4" fill="#ff7043"/>
  <circle cx="1100" cy="728" r="3" fill="#e040fb"/>
  <circle cx="1400" cy="722" r="4" fill="#ffeb3b"/>
  <circle cx="1750" cy="718" r="3" fill="#ff4081"/>

  <!-- Rivière/chemin -->
  <path d="M0 800 Q100 780 200 810 Q400 790 600 820 Q800 795 1000 815 Q1200 790 1400 810 Q1600 785 1800 805 Q1900 795 1920 800 L1920 840 Q1800 835 1600 845 Q1400 830 1200 850 Q1000 835 800 845 Q600 830 400 850 Q200 835 0 840 Z" fill="#64b5f6" opacity="0.4"/>

  <!-- Reflets de lumière sur l'eau -->
  <line x1="300" y1="810" x2="350" y2="815" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="700" y1="830" x2="760" y2="835" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="1200" y1="820" x2="1250" y2="825" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Logo NextProjectOS -->
  <g transform="translate(960, 420)">
    <!-- Anneau extérieur -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#logoGrad)" stroke-width="4" opacity="0.9" filter="url(#glow)"/>

    <!-- Anneau intérieur -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>

    <!-- Logo N -->
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="white" filter="url(#glow)" opacity="0.95">N</text>

    <!-- Points lumineux orbitaux -->
    <circle cx="60" cy="0" r="5" fill="#4fc3f7" opacity="0.9"/>
    <circle cx="-60" cy="0" r="5" fill="#4fc3f7" opacity="0.4"/>
    <circle cx="0" cy="-60" r="5" fill="#4fc3f7" opacity="0.6"/>
    <circle cx="0" cy="60" r="5" fill="#4fc3f7" opacity="0.7"/>
  </g>

  <!-- Texte NextProjectOS -->
  <text x="960" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="300" font-size="28" fill="white" opacity="0.8">NextProjectOS</text>

  <!-- Reflet lumineux en bas -->
  <rect x="0" y="960" width="1920" height="120" fill="url(#skyFloor)" opacity="0.3"/>

  <!-- Particules lumineuses -->
  <circle cx="100" cy="500" r="2" fill="white" opacity="0.3"/>
  <circle cx="450" cy="400" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="800" cy="350" r="2" fill="white" opacity="0.25"/>
  <circle cx="1300" cy="380" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="1700" cy="450" r="2" fill="white" opacity="0.3"/>
  <circle cx="200" cy="350" r="1" fill="white" opacity="0.2"/>
  <circle cx="1500" cy="300" r="1.5" fill="white" opacity="0.15"/>
</svg>
