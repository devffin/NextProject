<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="40%" stop-color="#1565c0"/>
      <stop offset="70%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#29b6f6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0277bd" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ring2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29b6f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#01579b" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Glow en haut -->
  <rect width="1920" height="540" fill="url(#glow)"/>

  <!-- Accent diagonal -->
  <rect width="1920" height="1080" fill="url(#accent)"/>

  <!-- Lignes horizontales subtiles -->
  <line x1="0" y1="360" x2="1920" y2="360" stroke="#4fc3f7" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="#4fc3f7" stroke-width="0.5" opacity="0.08"/>

  <!-- Shine -->
  <rect width="1920" height="1080" fill="url(#shine)"/>

  <!-- Logo principal -->
  <g transform="translate(960, 420)">
    <!-- Anneau externe -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="url(#ring1)" stroke-width="3"/>
    <circle cx="0" cy="0" r="78" fill="none" stroke="url(#ring2)" stroke-width="1.5"/>

    <!-- Points orbitaux -->
    <circle cx="90" cy="0" r="6" fill="#4fc3f7" opacity="0.9"/>
    <circle cx="0" cy="90" r="4" fill="#29b6f6" opacity="0.6"/>
    <circle cx="-90" cy="0" r="5" fill="#0277bd" opacity="0.7"/>
    <circle cx="0" cy="-90" r="3" fill="#4fc3f7" opacity="0.5"/>

    <!-- Petit anneau intermediaire -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.2" stroke-dasharray="4,6"/>

    <!-- Lettre N -->
    <text x="0" y="20" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="64" fill="url(#nGrad)">N</text>
  </g>

  <!-- Sous-titre -->
  <text x="960" y="560" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="300" font-size="22" fill="white" opacity="0.5">NextProjectOS</text>

  <!-- Barre brillante -->
  <rect x="810" y="580" width="300" height="1" fill="#4fc3f7" opacity="0.2"/>

  <!-- Bande lumineuse bas -->
  <rect x="0" y="920" width="1920" height="160" fill="#4fc3f7" opacity="0.04"/>
  <line x1="0" y1="920" x2="1920" y2="920" stroke="#4fc3f7" stroke-width="0.5" opacity="0.15"/>
</svg>
