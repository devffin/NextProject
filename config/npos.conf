[Desktop]
wallpaper = ~/.local/share/backgrounds/npos/default.svg
wallpaper_style = stretch
show_icons = true
icon_size = 64
text_shadow = true

[Panel]
position = bottom
height = 36
opacity = 0.85
blur = true
autohide = false
glass_effect = true

[Dock]
enabled = true
position = bottom
icon_size = 48
autohide = false
opacity = 0.80

[Menu]
style = aero
show_recent = true
show_favorites = true
blur_background = true

[Theme]
name = NextAero
gtk_theme = NextAero
icon_theme = NPIcons
cursor_theme = default
font = Cantarell 10
accent_color = #4fc3f7
glass_color = #1e88e5

[Compositor]
enabled = true
shadow = true
blur = true
animation = true
fade = true

[Apps]
file_manager = nextfile
terminal = nextterm
editor = nextedit
browser = firefox
